name: Sincronizar Notion

on:
  schedule:
    # Evita minutos "redondos" (:00 :15 :30 :45) — são os horários de pico da
    # fila de cron do GitHub Actions (todo mundo agenda nesses minutos), o
    # que atrasa ou até pula execuções. Rodando em :07/:22/:37/:52 a fila
    # costuma estar bem mais livre.
    - cron: '7,22,37,52 * * * *'   # a cada 15 minutos, deslocado
  workflow_dispatch: {}       # permite rodar manualmente pela aba Actions

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sincronizar dados do Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.mjs

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dados.json data/historico.json
          git diff --staged --quiet || git commit -m "chore: sincroniza dados do Notion"
          git push
