name: Sincronizar Notion

on:
  push:
    branches: [main]          # republica o site a cada alteração manual no repo
  schedule:
    # Agendamento nativo do GitHub — porém é "best-effort": pode atrasar
    # muito ou nem disparar (principalmente em repositórios novos). Fica como
    # rede de segurança; a atualização confiável vem do repository_dispatch
    # acionado por um serviço de cron externo (ver README).
    - cron: '7,22,37,52 * * * *'   # a cada 15 minutos, deslocado dos minutos de pico
  repository_dispatch:
    types: [sincronizar]     # gatilho externo confiável (cron-job.org etc.)
  workflow_dispatch: {}       # permite rodar manualmente pela aba Actions

permissions:
  contents: write   # para commitar os dados sincronizados
  pages: write      # para publicar no GitHub Pages
  id-token: write   # exigido pelo deploy-pages

# Um deploy do Pages por vez. Não cancela em andamento (para não marcar como
# falho um deploy que já estava publicando).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sincronizar dados do Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.mjs

      - name: Commitar dados atualizados
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dados.json data/historico.json
          if git diff --staged --quiet; then
            echo "Sem mudanças nos dados; nada a commitar."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore: sincroniza dados do Notion"
          # A branch pode ter avançado (outro push/sync). Faz rebase e tenta de
          # novo algumas vezes para não falhar por corrida.
          for tentativa in 1 2 3 4 5; do
            if git push; then
              echo "Push OK na tentativa $tentativa."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Push rejeitado (tentativa $tentativa); rebaseando..."
            git pull --rebase origin main
          done
          echo "Falhou o push após várias tentativas." >&2
          exit 1

  # Publica o site logo após a sincronização, no mesmo fluxo. Necessário
  # porque um commit feito pelo GITHUB_TOKEN (o do job acima) NÃO dispara
  # outros workflows — então o deploy precisa acontecer aqui mesmo.
  # Só publica quando os dados mudaram (ou quando foi um push manual no repo),
  # evitando redeploys inúteis a cada 15 min quando nada mudou no Notion.
  deploy:
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pega o commit recém-criado com os dados novos
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
