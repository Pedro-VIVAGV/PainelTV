name: Sincronizar Notion

on:
  repository_dispatch:
    types: [sincronizar]     # gatilho confiável do cron externo (cron-job.org)
  workflow_dispatch: {}       # permite rodar manualmente pela aba Actions
  schedule:
    # Rede de segurança (o agendamento nativo do GitHub é "best-effort").
    - cron: '7,22,37,52 * * * *'

permissions:
  contents: write   # para commitar os dados sincronizados

# Evita duas sincronizações rodando ao mesmo tempo (uma commitaria por cima
# da outra). Não cancela em andamento para não perder um commit já em curso.
concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sincronizar dados do Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node scripts/sync-notion.mjs

      # Comita os dados novos. A publicação no site é feita automaticamente
      # pelo GitHub Pages (modo "Deploy from a branch"), que reconstrói a cada
      # commit em main — inclusive commits do robô. Por isso não há passo de
      # deploy aqui.
      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dados.json data/historico.json
          if git diff --staged --quiet; then
            echo "Sem mudanças nos dados; nada a commitar."
            exit 0
          fi
          git commit -m "chore: sincroniza dados do Notion"
          # A branch pode ter avançado; faz rebase e tenta de novo algumas vezes.
          for tentativa in 1 2 3 4 5; do
            if git push; then
              echo "Push OK na tentativa $tentativa."
              exit 0
            fi
            echo "Push rejeitado (tentativa $tentativa); rebaseando..."
            git pull --rebase origin main
          done
          echo "Falhou o push após várias tentativas." >&2
          exit 1
